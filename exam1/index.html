<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            display: flex;
            justify-content: center;
        }

        .btn {
            margin-right: 10px;
            padding: 6px 12px;
            color: white;
            background-color: blue;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .result {
            text-align: center;
            font-family: sans-serif;
        }
        .text{
            text-align: center;
            font-family: sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="box">
        <input class="input" type="text" placeholder="زمان مورد نظر خود را وارد کنید">
        <button class="btn">شروع</button>
    </div>

    <p class="result">0</p>

    <p class="text"></p>
    <script src="./script.js"></script>
</body>

</html>
