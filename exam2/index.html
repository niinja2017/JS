<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رنگین‌کمان شناور</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            transition: 0.9s;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .box {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .box.hovered {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }
        .dark{
            background-color: gray;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box" style="background-color: #FF6B6B;"></div>
        <div class="box" style="background-color: #4ECDC4;"></div>
        <div class="box" style="background-color: #45B7D1;"></div>
        <div class="box" style="background-color: #FED766;"></div>
        <div class="box" style="background-color: #8338EC;"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
