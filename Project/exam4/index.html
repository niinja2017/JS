<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slider</title>
    <style>
        .main{
            width: 50%;
            margin: auto;
            position: relative;
        }
        .main img{
            width: 100%;
            box-shadow: 1px 1px 10px black;
            display: block;
        }
        .next{
            position: absolute;
            top: 50%;
            right: 0;
            margin-right: 1.5rem;
            color: white;
            text-shadow: 1px 1px black;
            text-decoration: none;
        }
        .prev{
            position: absolute;
            top: 50%;
            left: 0;
            margin-left: 1.5rem;
            color: white;
            text-shadow: 1px 1px black;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="main">
        <img src="./../../image/peakpx.jpg" alt="image">
        <a href="#" class="next">next</a>
        <a href="#" class="prev">prev</a>
    </div>

    <script src="./script.js"></script>
</body>
</html>
